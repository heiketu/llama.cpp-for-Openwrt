name: Build llama.cpp Server for AArch64 Static-NEON Musl

on:
  workflow_dispatch: # 允许手动点击按钮触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cross-Compilation Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Clone llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp && git checkout master

      - name: Build Static Server with NEON Optimization
        run: |
          cd llama.cpp
          mkdir build
          cd build
          # 核心编译指令：强制指定 ARMv8-A + SIMD(NEON) 并执行完全静态链接
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DGGML_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_C_FLAGS="-march=armv8-a+simd" \
            -DCMAKE_CXX_FLAGS="-march=armv8-a+simd"
          
          # 使用所有可用 CPU 核心进行编译
          make -j$(nproc)

      - name: Strip Binary (Maximize Space Saving)
        run: |
          # 去掉调试符号，使二进制文件体积大幅减小（从 ~40MB 降至 ~20MB）
          aarch64-linux-gnu-strip llama.cpp/build/bin/llama-server

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-aarch64-static-neon
          path: llama.cpp/build/bin/llama-server
